<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Shopping Cart</title>

  <link rel="stylesheet" href="cart.css">

</head>

<body>

  <div class="cart-container">

    <h1>🛒 Your Cart</h1>

    <div id="cart-items"></div>

    <button onclick="sendOrder()">

      Clear Cart
    </button>

  </div>

  <script src="cart.js"></script>

</body>

</html>
