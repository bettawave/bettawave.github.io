<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guppies Collection</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background:#0b1220;
      color:white;
    }

    h1{
      text-align:center;
      padding:20px;
      color:#00d9ff;
      font-size:40px;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#162033;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.4);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card h2{
      margin:0;
      font-size:22px;
      color:white;
    }

    .price{
      color:#00ff99;
      font-size:20px;
      font-weight:bold;
      margin-top:10px;
    }

  </style>
</head>

<body>

  <h1>Premium Guppies Collection</h1>

  <div class="container" id="guppyContainer"></div>

  <script src="guppies.js"></script>

</body>
</html>
